services:
  raooza-backend:
    build: .
    container_name: raooza-backend
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

